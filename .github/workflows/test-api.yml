---
name: API tests

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/test-api.yml"
      - "src/api/**"
      - "src/tests/api/**"
      - "src/tests/test_helpers.py"
      - "src/tests/fixtures/**"
      - "src/examples/**"
      - "src/src/**"
      - "src/manage.py"
      - "src/tool.jar"
      - "requirements.txt"
      - "pyproject.toml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/test-api.yml"
      - "src/api/**"
      - "src/app/**" # src/api/views.py imports from app.{models,core,generateXml,utils}
      - "src/tests/api/**"
      - "src/tests/test_helpers.py"
      - "src/tests/fixtures/**"
      - "src/examples/**"
      - "src/src/**"
      - "src/manage.py"
      - "src/tool.jar"
      - "requirements.txt"
      - "pyproject.toml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      redis:
        image: redis
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "17"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run API tests
        env:
          ONLINE_TOOL_GITHUB_KEY: ${{ secrets.ONLINE_TOOL_GITHUB_KEY }}
          ONLINE_TOOL_GITHUB_SECRET: ${{ secrets.ONLINE_TOOL_GITHUB_SECRET }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          TEST_GITHUB_USER_ID: ${{ secrets.TEST_GITHUB_USER_ID }}
          TEST_GITHUB_USER_NAME: ${{ secrets.TEST_GITHUB_USER_NAME }}
          OAUTH_APP_ID: ${{ secrets.OAUTH_APP_ID }}
          OAUTH_APP_SECRET: ${{ secrets.OAUTH_APP_SECRET }}
          AUTH_CODE: ${{ secrets.AUTH_CODE }}
        run: |
          cd src
          python manage.py makemigrations
          python manage.py migrate
          python manage.py test tests.api -v 2
